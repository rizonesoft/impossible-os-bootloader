# GRUB Configuration — Impossible OS (UEFI)

set timeout=3
set default=0

# Load video drivers so GRUB can set a framebuffer mode
insmod all_video

# Request a graphical framebuffer — try 1280x720 (HD), fall back to others
set gfxmode=1280x720x32,1024x768x32,auto
set gfxpayload=keep

menuentry "Impossible OS" {
    multiboot2 /boot/kernel.exe
    boot
}
