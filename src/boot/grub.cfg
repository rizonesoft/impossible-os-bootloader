# GRUB Configuration — Impossible OS (UEFI)

set timeout=3
set default=0

# Load video drivers so GRUB can set a framebuffer mode
insmod all_video

# Request a graphical framebuffer — try 1024x768, fall back to auto
set gfxmode=1024x768x32,800x600x32,auto
set gfxpayload=keep

menuentry "Impossible OS" {
    multiboot2 /boot/kernel.elf
    module2 /boot/initrd.img
    boot
}
