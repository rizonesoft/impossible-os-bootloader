## Impossible OS — Embedded GRUB Configuration
## This file is baked into the standalone GRUB EFI binary at build time.
## It is NOT read from disk at boot — changes require rebuilding GRUB EFI.

set timeout=0
set default=0

## Graphics mode — required for framebuffer handoff to kernel via Multiboot2
## Without this, GRUB won't pass framebuffer info and the boot splash won't display.
set gfxmode=1280x720x32,1920x1080x32,auto
set gfxpayload=keep
insmod all_video
insmod gfxterm
terminal_output gfxterm

## Serial output (for Hyper-V named pipe and QEMU -serial)
serial --unit=0 --speed=115200
terminal_output gfxterm serial

## Find the partition containing our kernel
search --file /boot/kernel.exe --set root

menuentry "Impossible OS" {
    echo "Loading Impossible OS kernel..."
    multiboot2 /boot/kernel.exe
    boot
}

menuentry "Impossible OS (Safe Mode)" {
    echo "Loading Impossible OS (Safe Mode)..."
    multiboot2 /boot/kernel.exe -- boot_mode=safe
    boot
}

menuentry "Impossible OS (Recovery Console)" {
    echo "Loading Impossible OS (Recovery Console)..."
    multiboot2 /boot/kernel.exe -- boot_mode=recovery
    boot
}
