## Impossible OS — GRUB Configuration (Debug Build)
## This file is copied to /boot/grub/grub.cfg on the ESP.
## After debugging is complete, remove 'set debug=' and 'sleep' lines.

## --- DEBUG: Verbose GRUB output for Hyper-V diagnosis ---
## Uncomment the next line for maximum GRUB verbosity:
# set debug=all
## For targeted multiboot debugging:
set debug=multiboot

set timeout=0
set default=0

## Video mode — set framebuffer for kernel via Multiboot2
## Works on QEMU (Bochs VGA), VirtualBox, and Hyper-V (EFI GOP)
if [ "${grub_platform}" == "efi" ]; then
    insmod efi_gop
fi
insmod all_video

set gfxmode=1280x720x32,1920x1080x32,auto
set gfxpayload=keep

## NOTE: Do NOT add 'serial' command here.
## GRUB's serial init leaves COM1 in a bad state on Hyper-V Gen2.
## The kernel initializes COM1 itself in serial_init().

## Find the partition containing our kernel
search --file /boot/kernel.exe --set root
if [ -z "$root" ]; then
    echo "ERROR: Could not find /boot/kernel.exe on any partition!"
    echo "Partitions visible to GRUB:"
    ls
    sleep 30
fi

menuentry "Impossible OS" {
    echo "Loading Impossible OS kernel..."
    echo "  root=$root"
    echo "  platform=$grub_platform"

    if multiboot2 /boot/kernel.exe; then
        echo "  multiboot2: OK — calling boot..."
        boot
    else
        echo ""
        echo "  *** FAILED: multiboot2 could not load /boot/kernel.exe ***"
        echo "  Check: Is kernel.exe a valid ELF with Multiboot2 header?"
        echo "  Listing /boot/:"
        ls /boot/
        echo ""
        echo "Press any key..."
        sleep 30
    fi
}

menuentry "Impossible OS (Safe Mode)" {
    echo "Loading Impossible OS (Safe Mode)..."
    multiboot2 /boot/kernel.exe -- boot_mode=safe
    boot
}

menuentry "Impossible OS (Recovery Console)" {
    echo "Loading Impossible OS (Recovery Console)..."
    multiboot2 /boot/kernel.exe -- boot_mode=recovery
    boot
}
